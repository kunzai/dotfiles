theme = "tokyonight"

[editor]
line-number = "relative"
mouse = false
bufferline = "multiple"
color-modes = true
cursorline = true
scrolloff = 999

[editor.cursor-shape]
insert = "underline"
#normal = "block"
normal = "block"
#select = "bar"
select = "underline"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true

[editor.file-picker]
hidden = false
git-ignore = true

[editor.indent-guides]
render = true
character = "╎" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
X = "extend_line_above"
G = "goto_file_end"
ret = ["move_line_down", "goto_line_start"]
# keep it faster and vim like, jump start of line
0 = "goto_line_start"
# C-p = ["move_line_up", "scroll_up"]
# C-n = ["move_line_down", "scrool_down"]
# C-h = "jump_view_left"
# C-l = "jump_view_right"

[keys.insert]
j = { j = "normal_mode" }
